<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ircBloqV4-Agent</title>
    <link rel="stylesheet" type="text/css" href="index.css">
    <style>
        body {
            background-color: #f90b9e;
            margin: 0;
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: white;
            overflow: hidden;
        }

        .app {
            text-align: center;
            max-width: 500px;
            padding: 20px;
        }

        .logo {
            width: 150px;
            height: 150px;
            margin-bottom: 20px;
        }

        .info {
            font-weight: bold;
            font-size: 20px;
        }

        progress {
            width: 100%;
            height: 20px;
            margin: 10px 0;
            border-radius: 10px;
            overflow: hidden;
        }

        progress::-webkit-progress-value {
            background-color: #f90b9e;
            border-radius: 10px;
        }

        progress::-webkit-progress-bar {
            background-color: #444;
            border-radius: 10px;
        }

        .status-text {
            margin: 10px 0;
            font-size: 14px;
            min-height: 40px;
        }

        .file-info {
            color: #aaa;
            font-size: 12px;
            margin-top: 5px;
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 999;
        }

        .modal-content {
            background: white;
            padding: 20px;
            border-radius: 15px;
            color: #000;
            width: 300px;
            text-align: center;
        }

        .hidden {
            display: none;
        }

        .modal button {
            margin-top: 15px;
            padding: 8px 15px;
            background-color: #ff4444;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="app">
        <div>
            <img class="logo" alt="IrcBloq-Agent" src="./icon/IrcBloq-Agent.svg">
        </div>
        <div class="info">
            <h2 id="product-name">ircBloqV4-Agent</h2>
            <div class="version">
                <div id="product-version">App Version 0.0.0</div>
                <div class="component-version">
                    <p id="electron-version">Electron 0.0.0</p>
                    <p id="chrome-version">Chrome 00.0.0000.000</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Download Modal -->
    <div id="downloadModal" class="modal hidden">
        <div class="modal-content">
            <h3>Downloading Tools...</h3>
            <progress id="downloadProgress" max="100" value="0"></progress>
            <p id="downloadStatus">Starting...</p>
            <p id="downloadFile"></p>
            <button onclick="abortDownload()">Abort</button>
        </div>
    </div>

    <!-- Extract Modal -->
    <div id="extractModal" class="modal hidden">
        <div class="modal-content">
            <h3>Extracting Tools...</h3>
            <progress id="extractProgress" max="100" value="0"></progress>
            <p id="extractStatus">Extracting...</p>
            <button onclick="abortExtraction()">Abort</button>
        </div>
    </div>

    <script>
        const { ipcRenderer } = require('electron');

        const downloadModal = document.getElementById('downloadModal');
        const extractModal = document.getElementById('extractModal');

        ipcRenderer.on('download-progress', (event, data) => {
            const downloadProgress = document.getElementById('downloadProgress');
            const downloadStatus = document.getElementById('downloadStatus');
            const downloadFile = document.getElementById('downloadFile');

            downloadModal.classList.remove('hidden');

            switch (data.status) {
                case "deleting":
                    downloadStatus.textContent = `Deleting old tools files. Please wait...`;
                    break;
                case 'starting':
                    downloadStatus.textContent = `Starting download: ${data.fileName}`;
                    break;
                case 'downloading':
                    downloadProgress.value = data.progress;
                    downloadStatus.textContent = `Downloading: ${data.progress}%`;
                    downloadFile.textContent = `File: ${data.fileName}`;
                    break;
                case 'exists-valid':
                    downloadProgress.value = 100;
                    downloadStatus.textContent = `Using cached file: ${data.fileName}`;
                    break;
                case 'verifying':
                    downloadStatus.textContent = `Verifying: ${data.fileName}`;
                    break;
            }
        });

        ipcRenderer.on('extract-progress', (event, data) => {
            downloadModal.classList.add('hidden');
            extractModal.classList.remove('hidden');
            document.getElementById('extractStatus').textContent = `Extracting ${data.fileName}: ${data.percent}%`;
            document.getElementById('extractProgress').value = data.percent;
        });

        ipcRenderer.on('download-complete', () => {
            downloadModal.classList.add('hidden');
            extractModal.classList.add('hidden');
            document.getElementById('progressText').textContent = "All tools downloaded and ready!";
            document.getElementById('progressBar').value = 100;
            document.getElementById('fileInfo').textContent = "";
        });

        ipcRenderer.on('download-error', (event, error) => {
            downloadModal.classList.add('hidden');
            extractModal.classList.add('hidden');
            document.getElementById('progressText').innerHTML = `<span style="color: #ff4444">Error: ${error}</span>`;
            document.getElementById('fileInfo').textContent = "";
        });

        ipcRenderer.on('download-status', (event, message) => {
            document.getElementById('fileInfo').textContent = message;
        });

        function abortDownload() {
            ipcRenderer.send('abort-download');
            downloadModal.classList.add('hidden');
        }

        function abortExtraction() {
            ipcRenderer.send('abort-extraction');
            extractModal.classList.add('hidden');
        }
    </script>
</body>
</html>
